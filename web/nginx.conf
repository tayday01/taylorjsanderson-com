server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed asset bundles emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unmatched path returns index.html so the React
    # router (or future routing) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Liveness probe for compose healthcheck.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
