server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed asset bundles emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Public assets (images, fonts, etc.). Serve directly with a long cache
    # header, and 404 if the file is missing — DO NOT fall through to the
    # SPA's index.html. Returning HTML for a missing image lets Cloudflare
    # cache the HTML against the image URL and breaks the page until purge.
    location ~* \.(?:jpe?g|png|gif|webp|avif|svg|ico|woff2?|ttf|otf|mp4|webm)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — unmatched path serves index.html so React Router can
    # take over. Short cache so HTML deploys propagate quickly.
    location / {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Liveness probe for compose healthcheck.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
